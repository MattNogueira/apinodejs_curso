name: Deploy API Node Prisma SQLite

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd ~/apinodejs_curso

            git pull origin master

            docker compose build api-node-prisma-sqlite
            docker compose up -d api-node-prisma-sqlite

            docker compose exec -T api-node-prisma-sqlite npm run prisma:deploy

            docker image prune -f

            docker compose ps